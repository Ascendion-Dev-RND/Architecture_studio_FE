<div class="min-h-screen gradient-hero">
  <app-breadcrumb [items]="breadcrumbItems" />
  
  <!-- Navigation -->
  <nav class="fixed top-0 left-0 right-0 z-50 bg-transparent">
    <div class="container mx-auto px-6 py-4 flex items-center justify-between">
      <a routerLink="/" class="flex items-center gap-2">
        <span class="text-lg font-medium tracking-wide bg-gradient-to-r from-coral to-coral-light bg-clip-text text-transparent">
          Architecture-Studio
        </span>
      </a>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="pt-32 pb-20">
    <div class="container mx-auto px-6 max-w-6xl">
      <!-- Header -->
      <div class="text-center mb-12">
        <h1 class="mb-4" style="align-self: stretch; text-align: center; font-family: 'Mulish', sans-serif; font-size: 64px; font-style: normal; font-weight: 500; line-height: 75px;">
          <span style="color: #3B3F46;">Modernization </span><span style="background: linear-gradient(103deg, #0044A3 45.68%, #03BDD4 60.03%); background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Studio</span>
        </h1>
        <p class="max-w-2xl mx-auto" style="color: #64748B; text-align: center; font-family: 'Mulish', sans-serif; font-size: 24px; font-style: normal; font-weight: 400; line-height: 28px;">
          Transform your legacy systems with AI-powered modernization strategies and architecture blueprints
        </p>
      </div>

      <!-- Module Cards -->
      <div class="grid md:grid-cols-2 gap-6 max-w-4xl mx-auto">
        <!-- Modernization Studio -->
        <button
          type="button"
          (click)="navigateToDiscovery()"
          class="bg-card rounded-3xl p-8 card-shadow hover-lift transition-all duration-300 text-left group">
          <div class="flex items-start justify-between mb-4">
            <h2 class="text-2xl font-bold text-foreground group-hover:text-coral transition-colors">
              Modernization<br/>Studio
            </h2>
            <div class="p-3 bg-coral/10 rounded-xl">
              <lucide-icon name="RefreshCw" class="w-6 h-6 text-coral"></lucide-icon>
            </div>
          </div>
          
          <p class="text-sm font-medium text-coral mb-3">Legacy to modern</p>
          
          <p class="text-sm text-muted-foreground leading-relaxed">
            Modernize legacy architectures and systems with AI-driven design approaches and migration strategies
          </p>
        </button>

        <!-- Artifact Hub -->
        <button
          type="button"
          (click)="navigateToArtifactHub()"
          class="bg-card rounded-3xl p-8 card-shadow hover-lift transition-all duration-300 text-left group opacity-50 cursor-not-allowed">
          <div class="flex items-start justify-between mb-4">
            <h2 class="text-2xl font-bold text-foreground">
              Artifact<br/>Hub
            </h2>
            <div class="p-3 bg-lavender/10 rounded-xl">
              <lucide-icon name="FileArchive" class="w-6 h-6 text-lavender"></lucide-icon>
            </div>
          </div>
          
          <p class="text-sm font-medium text-lavender mb-3">Generate artifacts</p>
          
          <p class="text-sm text-muted-foreground leading-relaxed">
            Generate all technical artifacts including HLD, LLD, and other architecture documentation
          </p>
          
          <p class="text-xs text-muted-foreground mt-4 italic">Coming soon</p>
        </button>
      </div>

      <!-- Back to Home -->
      <div class="text-center mt-12">
        <a routerLink="/" class="inline-flex items-center gap-2 text-muted-foreground hover:text-foreground transition-colors">
          <lucide-icon name="ArrowLeft" class="w-4 h-4"></lucide-icon>
          <span class="text-sm">Back to Home</span>
        </a>
      </div>
    </div>
  </main>
</div>
