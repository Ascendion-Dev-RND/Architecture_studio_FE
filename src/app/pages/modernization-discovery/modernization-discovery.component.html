<div class="min-h-screen gradient-hero">
  <!-- Breadcrumb Navigation -->
  <app-breadcrumb [items]="breadcrumbItems" />
  
  <!-- Navigation -->
  <!-- <nav class="fixed top-0 left-0 right-0 z-50 gradient-lavender bg-background/80 backdrop-blur-md border-0 border-border/50">
    <div class="container mx-auto px-6 py-4 flex items-center justify-between">
      <a routerLink="/" class="flex items-center gap-2">
        <span class="text-lg font-medium tracking-wide bg-gradient-to-r from-coral to-coral-light bg-clip-text text-transparent">
          Architecture-Studio
        </span>
      </a>
    </div>
  </nav> -->

  <!-- Main Content -->
  <main class="pt-24 pb-20">
    <div class="container mx-auto px-6 max-w-5xl">
      <!-- Header -->
      <div class="text-center mb-8">
        <h1 class="text-4xl font-bold mb-3">
          <span class="bg-gradient-to-r from-coral to-coral-light bg-clip-text text-transparent">Modernization</span>
          <span class="text-foreground"> Discovery</span>
        </h1>
        <p class="text-muted-foreground">
          Describe your current system and set your modernization preferences
        </p>
      </div>

      <!-- Main Form -->
      <div class="space-y-6">
        <!-- System Description Section -->
        <div class="bg-card rounded-2xl p-6 card-shadow">
          <h2 class="text-lg font-semibold text-foreground mb-4">Describe Your Current System</h2>
          
          <!-- Textarea -->
          <textarea
            [(ngModel)]="systemDescription"
            placeholder="Describe your current system architecture, technology stack, pain points, and challenges... (minimum 20 characters)"
            class="w-full min-h-[200px] px-4 py-3 bg-background border-2 border-border rounded-xl text-foreground resize-none focus:outline-none focus:border-coral transition-colors"
            rows="8"></textarea>

          <!-- File Attachments -->
          <div class="mt-4">
            <input
              type="file"
              multiple
              accept=".png,.pdf,.drawio,.docx,.jpg,.jpeg"
              (change)="handleFileUpload($event)"
              class="hidden"
              #fileInput>
            
            <button
              type="button"
              (click)="fileInput.click()"
              class="flex items-center gap-2 px-4 py-2 bg-secondary/50 hover:bg-secondary rounded-xl transition-colors">
              <lucide-icon name="Upload" class="w-4 h-4 text-muted-foreground"></lucide-icon>
              <span class="text-sm text-foreground">Attach Files (diagrams, docs, runbooks)</span>
            </button>

            <!-- Attached Files List -->
            <div *ngIf="uploadedFiles.length > 0" class="mt-3">
              <p class="text-sm font-medium text-foreground mb-2">Attached Files</p>
              <div class="flex flex-wrap gap-2">
                <div *ngFor="let file of uploadedFiles; let i = index" class="flex items-center gap-2 px-3 py-2 bg-secondary/50 rounded-lg">
                  <lucide-icon name="FileText" class="w-4 h-4 text-muted-foreground"></lucide-icon>
                  <span class="text-sm text-foreground">{{ file.name }}</span>
                  <button (click)="removeFile(i)" type="button" class="hover:bg-secondary rounded p-1">
                    <lucide-icon name="X" class="w-3 h-3 text-muted-foreground"></lucide-icon>
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Preferences Section -->
        <div class="bg-card rounded-2xl p-6 card-shadow">
          <h2 class="text-lg font-semibold text-foreground mb-6">Modernization Preferences</h2>

          <div class="space-y-6">
            <!-- Cloud Model -->
            <div>
              <h3 class="font-semibold text-foreground mb-3 flex items-center gap-2">
                <lucide-icon name="Cloud" class="w-5 h-5 text-coral"></lucide-icon>
                Preferred Cloud / Hosting Model
              </h3>
              <div class="flex flex-wrap gap-3">
                <button
                  *ngFor="let model of cloudModels"
                  type="button"
                  (click)="selectedCloudModel = model"
                  [ngClass]="{
                    'px-4 py-2 rounded-lg border-2 transition-all': true,
                    'border-coral bg-coral/10 text-coral': selectedCloudModel === model,
                    'border-border text-muted-foreground': selectedCloudModel !== model
                  }">
                  {{ model }}
                </button>
              </div>
            </div>

            <!-- Timeline -->
            <div>
              <h3 class="font-semibold text-foreground mb-3 flex items-center gap-2">
                <lucide-icon name="Clock" class="w-5 h-5 text-coral"></lucide-icon>
                Transformation Timeline
              </h3>
              <div class="flex flex-wrap gap-3">
                <button
                  *ngFor="let timeline of timelines"
                  type="button"
                  (click)="selectedTimeline = timeline"
                  [ngClass]="{
                    'px-4 py-2 rounded-lg border-2 transition-all': true,
                    'border-coral bg-coral/10 text-coral': selectedTimeline === timeline,
                    'border-border text-muted-foreground': selectedTimeline !== timeline
                  }">
                  {{ timeline }}
                </button>
              </div>
            </div>

            <!-- Outcomes -->
            <div>
              <h3 class="font-semibold text-foreground mb-3 flex items-center gap-2">
                <lucide-icon name="Target" class="w-5 h-5 text-coral"></lucide-icon>
                Primary Modernization Outcomes
              </h3>
              <div class="flex flex-wrap gap-3">
                <button
                  *ngFor="let outcome of outcomes"
                  type="button"
                  (click)="toggleOutcome(outcome.id)"
                  [ngClass]="{
                    'px-4 py-2 rounded-lg border-2 transition-all flex items-center gap-2': true,
                    'border-coral bg-coral/10 text-coral': isOutcomeSelected(outcome.id),
                    'border-border text-muted-foreground': !isOutcomeSelected(outcome.id)
                  }">
                  <lucide-icon [name]="outcome.icon" class="w-4 h-4"></lucide-icon>
                  {{ outcome.label }}
                </button>
              </div>
            </div>
          </div>
        </div>

        <!-- Analyze Button -->
        <div class="flex justify-center">
          <button
            type="button"
            (click)="analyzeCurrentState()"
            [disabled]="!canAnalyze()"
            [ngClass]="{
              'px-10 py-4 rounded-xl font-medium flex items-center gap-3 transition-all': true,
              'bg-gradient-to-r from-coral to-coral-light text-white hover:opacity-90': canAnalyze(),
              'bg-secondary/50 text-muted-foreground cursor-not-allowed': !canAnalyze()
            }">
            <lucide-icon name="Sparkles" class="w-5 h-5"></lucide-icon>
            <span>Analyze Current State</span>
          </button>
        </div>
      </div>
    </div>
  </main>
</div>
