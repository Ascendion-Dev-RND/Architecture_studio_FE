<a
  *ngIf="href; else divCard"
  [routerLink]="href"
  [ngClass]="cardClasses"
  class="group relative glass-card rounded-xl p-6 transition-all duration-300 overflow-hidden block cursor-pointer hover:card-shadow-hover"
>
  <div class="flex flex-col h-full"></div>
  <ng-container *ngTemplateOutlet="cardContent"></ng-container>
</a>

<ng-template #divCard>
  <div
    [ngClass]="cardClasses"
    class="group relative glass-card rounded-xl p-6 transition-all duration-300 overflow-hidden"
  >
    <ng-container *ngTemplateOutlet="cardContent"></ng-container>
  </div>
</ng-template>

<ng-template #cardContent>
  <div class="flex flex-col gap-3">
    <!-- Icon with gradient background -->
    <div
      class="w-[50px] h-[50px] p-3 rounded-xl bg-[linear-gradient(140.19deg,rgba(0,68,163,0.1)_6.27%,rgba(3,189,212,0.1)_95%)] flex items-center justify-center"
    >
      <img *ngIf="svgIcon" [src]="svgIcon" [alt]="title" class="w-6 h-6" />

      <lucide-icon
        *ngIf="!svgIcon"
        [name]="icon"
        class="w-6 h-6 text-[#0044A3]"
      >
      </lucide-icon>
    </div>

    <!-- Title -->
    <div>
      <h3
        class="text-2xl font-medium leading-tight"
        style="font-family: &quot;Mulish&quot;, sans-serif; color: #3b3f46"
      >
        {{ title }}
        <span *ngIf="subtitle" class="block">{{ subtitle }}</span>
      </h3>
    </div>

    <!-- Description -->
    <p
      class="text-sm leading-relaxed"
      style="font-family: &quot;Inter&quot;, sans-serif; color: #616874"
    >
      {{ description }}
    </p>

    <!-- Tagline Badge -->
    <div *ngIf="tagline" class="mt-auto">
      <span
        class="inline-flex items-center px-2 py-0.1 rounded-full bg-white text-base font-medium"
        style="color: #3b3f46; font-family: &quot;Inter&quot;, sans-serif"
      >
        {{ tagline }}
      </span>
    </div>
  </div>
</ng-template>
